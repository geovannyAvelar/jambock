<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">Report</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: Arial, sans-serif;
            color: #333;
            line-height: 1.6;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h2 {
            color: #34495e;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .info-section {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .info-section p {
            margin: 5px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        table thead {
            background-color: #3498db;
            color: white;
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }

        table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 0.9em;
            color: #7f8c8d;
        }

        .summary {
            background-color: #e8f5e9;
            padding: 15px;
            border-left: 4px solid #4caf50;
            margin: 20px 0;
        }

        .label {
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:text="${title}">Title</h1>
        <p th:if="${subtitle}" th:text="${subtitle}" style="font-size: 1.2em; color: #7f8c8d;"></p>
    </div>

    <div class="info-section">
        <p><span class="label">Generated on:</span> <span th:text="${generatedDate}"></span></p>
        <p th:if="${author}"><span class="label">Author:</span> <span th:text="${author}"></span></p>
        <p th:if="${description}"><span class="label">Description:</span> <span th:text="${description}"></span></p>
    </div>

    <div th:if="${items != null and !#lists.isEmpty(items)}">
        <h2>Items</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Quantity</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.description != null ? item.description : 'N/A'}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(item.price, 1, 2)}"></td>
                </tr>
            </tbody>
        </table>

        <div class="summary" th:if="${total != null}">
            <p style="font-size: 1.2em; margin: 0;">
                <span class="label">Total:</span>
                <span th:text="${'$' + #numbers.formatDecimal(total, 1, 2)}"></span>
            </p>
        </div>
    </div>

    <div th:if="${sections != null and !#lists.isEmpty(sections)}">
        <div th:each="section : ${sections}">
            <h2 th:text="${section.title}"></h2>
            <p th:text="${section.content}"></p>
        </div>
    </div>

    <div class="footer">
        <p>This report was automatically generated by Jambock Reports Engine</p>
        <p>Powered by Thymeleaf and Flying Saucer</p>
    </div>
</body>
</html>
